<div class="blog-card">

<img class="blog-image" src="{{image}}" alt="blog image">

<h2 class="blog-title">
<a href="blog.html?id={{id}}">
{{title}}
</a>
</h2>

<p class="blog-preview">
{{content}}
</p>

<div class="blog-meta">

<span class="author">{{author}}</span>

<span class="likes">
❤️ {{likes}}
</span>

</div>

</div>
