<!DOCTYPE html>
<html>

<head>
<meta charset="UTF-8">
<title>Blog</title>

<link rel="stylesheet" href="css/style.css">

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore-compat.js"></script>

</head>

<body>

<!-- NAVBAR -->
<div id="navbar"></div>

<div class="blog-page-container">

<div class="blog-content-card">

<h1 id="blogTitle"></h1>

<div class="blog-meta">
<span id="blogAuthor"></span>
</div>

<div id="blogContent" class="blog-full-content"></div>

<div class="blog-actions">

<button id="likeBtn">❤️ Like</button>

<span id="likeCount">0 Likes</span>

</div>

</div>


<div class="comments-section">

<h2>Comments</h2>

<div class="comment-input-box">

<input id="commentInput" placeholder="Write a comment">

<button id="postCommentBtn" type="button">Post Comment</button>

</div>

<div id="commentsContainer"></div>

</div>

</div>


<script src="js/firebase-config.js"></script>
<script src="js/auth/auth-state.js"></script>
<script src="js/ui/navbar.js"></script>
<script type="module" src="js/blogs/blog-page.js"></script>

</body>
</html>
